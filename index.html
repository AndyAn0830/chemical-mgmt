const getStockColor = (stock, max) => {
  const pct = (stock / max) * 100;
  if (pct >= 80) return "#ef4444";
  if (pct >= 50) return "#f59e0b";
  return "#22c55e";
};

const getCategoryColor = (cat) =>

            <div style={{ fontSize:11, color:"#64748b" }}>總務室 環管股 · 化學物質管理平台</div>
          </div>
          {isAdminMode && (
            <span style={{ marginLeft:"auto", background:"#7c3aed", color:"#fff", padding:"3px 10px", borderRadius:20, fontSize:11 }}>
              ✓ 管理員模式
            </span>
          )}
          <span style={{ marginLeft: isAdminMode ? 8 : "auto", fontSize:11, color:"#64748b" }}>
            {new Date().toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric" })}
          </span>
        </header>

        {/* Page Content */}
        <div style={{ flex:1, padding:24, overflow:"auto" }}>
          {page === "dashboard" && <DashboardPage stats={stats} chemicals={chemicals} setPage={setPage} setSelectedChem={setSelectedChem} setShowChemDetail={setShowChemDetail} />}
          {page === "map" && <MapPage chemicals={chemicals} mapBuilding={mapBuilding} setMapBuilding={setMapBuilding} mapFloor={mapFloor} setMapFloor={setMapFloor} setSelectedChem={setSelectedChem} setShowChemDetail={setShowChemDetail} floorPlans={floorPlans} setFloorPlans={setFloorPlans} mapMarkers={mapMarkers} setMapMarkers={setMapMarkers} floorVideos={floorVideos} setFloorVideos={setFloorVideos} floorPanoramas={floorPanoramas} setFloorPanoramas={setFloorPanoramas} isAdminMode={isAdminMode} showToast={showToast} />}
          {page === "iso" && <IsoPage chemicals={chemicals} setSelectedChem={setSelectedChem} setShowChemDetail={setShowChemDetail} setPage={setPage} setMapBuilding={setMapBuilding} setMapFloor={setMapFloor} />}
          {page === "chemicals" && <ChemicalsPage chemicals={filteredChemicals} allChemicals={chemicals} setChemicals={setChemicals} isAdminMode={isAdminMode} searchTerm={searchTerm} setSearchTerm={setSearchTerm} filterCat={filterCat} setFilterCat={setFilterCat} setSelectedChem={setSelectedChem} setShowChemDetail={setShowChemDetail} setEditingChem={setEditingChem} setShowAddChem={setShowAddChem} showToast={showToast} />}
          {page === "sds" && <SDSPage chemicals={chemicals} isAdminMode={isAdminMode} setChemicals={setChemicals} showToast={showToast} />}
          {page === "declarations" && <DeclarationsPage declarations={declarations} chemicals={chemicals} setDeclarations={setDeclarations} isAdminMode={isAdminMode} showToast={showToast} />}
          {page === "emergency" && <EmergencyPage chemicals={chemicals} />}
          {page === "training" && <TrainingPage records={trainingRecords} setRecords={setTrainingRecords} isAdminMode={isAdminMode} showToast={showToast} />}
          {page === "licenses" && <LicensePage licenses={licenses} setLicenses={setLicenses} showToast={showToast} />}
        </div>
      </main>

      {/* Modals */}
      {showAdminLogin && (
        <Modal title="管理員登入" onClose={() => setShowAdminLogin(false)}>
          <p style={{ color:"#94a3b8", fontSize:13, marginBottom:16 }}>請輸入管理員密碼（預設: admin）</p>
          <input value={adminPw} onChange={e => setAdminPw(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleAdminLogin()}
            type="password" placeholder="密碼"
            style={{ width:"100%", padding:"10px 12px", background:"#0f172a", border:"1px solid #334155", borderRadius:6, color:"#fff", fontSize:14, boxSizing:"border-box" }} />
          <div style={{ display:"flex", gap:8, marginTop:16 }}>
            <button onClick={handleAdminLogin} style={btnStyle("#0ea5e9")}>登入</button>
            <button onClick={() => setShowAdminLogin(false)} style={btnStyle("#334155")}>取消</button>
          </div>
        </Modal>
      )}

      {showChemDetail && selectedChem && (
        <ChemDetailModal chem={selectedChem} onClose={() => setShowChemDetail(false)} isAdminMode={isAdminMode} chemicals={chemicals} setChemicals={setChemicals} showToast={showToast} />
      )}

      {showAddChem && (
        <AddChemModal onClose={() => setShowAddChem(false)} onSave={(c) => {
          setChemicals(prev => [...prev, c]);
          setShowAddChem(false);
          showToast("化學品已新增");
        }} />
      )}

      {editingChem && (
        <EditChemModal chem={editingChem} onClose={() => setEditingChem(null)} onSave={(updated) => {
          setChemicals(prev => prev.map(c => c.id === updated.id ? updated : c));
          setEditingChem(null);
          showToast("資料已更新");
        }} />
      )}

      {/* Toast */}
      {toast && (
        <div style={{
          position:"fixed", bottom:24, right:24, background: toast.type === "error" ? "#ef4444" : "#22c55e",
          color:"#fff", padding:"10px 20px", borderRadius:8, fontSize:13, zIndex:9999,
          boxShadow:"0 4px 12px rgba(0,0,0,0.4)", animation:"slideIn 0.3s ease"
        }}>
          {toast.type === "error" ? "❌ " : "✓ "}{toast.msg}
        </div>
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        @keyframes slideIn { from { transform: translateX(100px); opacity:0; } to { transform: translateX(0); opacity:1; } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      `}</style>
    </div>
  );
}

                  </div>

        </table>

    </div>
  );
}

// ─── Map Page (Image Upload + Click-to-Mark) ───────────────────────────────────
function MapPage({ chemicals, mapBuilding, setMapBuilding, mapFloor, setMapFloor,
  setSelectedChem, setShowChemDetail, floorPlans, setFloorPlans,
  mapMarkers, setMapMarkers, floorVideos, setFloorVideos, floorPanoramas, setFloorPanoramas, isAdminMode, showToast }) {

  const FLOORS_BY_BUILDING = {
    "大愛樓": ["B1F","1F","2F","3F","5F","6F","7F"],
    "感恩樓": ["B1F","1F","2F","3F","5F","6F","7F","8F","9F","10F","11F"],
    "合心樓": ["B1F","1F","2F","3F","5F","6F","7F","8F","9F","10F","11F"],
    "協力樓": ["B1F","1F","2F","3F","5F","6F","7F","8F","9F","10F","11F"],
  };
  const availableFloors = FLOORS_BY_BUILDING[mapBuilding] || ["1F"];
  const planKey = `${mapBuilding}_${mapFloor}`;
  const currentPlan = floorPlans[planKey] || null;
  const currentMarkers = mapMarkers[planKey] || [];

  const MARKER_TYPES = {
    chemical: { label:"化學品", color_tox:"#ef4444", color_con:"#f59e0b", icon:"⚗" },
    disaster: { label:"防災物資", color:"#22c55e", icon:"🛡️" },
  };
  const [showVideoEdit, setShowVideoEdit] = useState(false);
  const [videoInput, setVideoInput] = useState("");
  const [panoramaModal, setPanoramaModal] = useState(null); // { label, url }
  const [showPanoramaAdd, setShowPanoramaAdd] = useState(false);
  const [panoramaLabel, setPanoramaLabel] = useState("");
  const panoramaFileRef = useRef(null);
  const panoramaDragRef = useRef(null);

  const currentVideo = floorVideos[planKey] || "";
  const currentPanoramas = floorPanoramas[planKey] || [];

  // Convert YouTube watch URL → embed URL
  const toEmbedUrl = (url) => {
    url = url.trim();
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([A-Za-z0-9_-]{11})/);
    if (m) return `https://www.youtube.com/embed/${m[1]}`;
    if (url.includes("youtube.com/embed/")) return url;
    return "";
  };

  const saveVideo = () => {
    const embed = toEmbedUrl(videoInput);
    if (!embed && videoInput.trim()) { alert("請貼上有效的 YouTube 網址"); return; }
    setFloorVideos(prev => ({ ...prev, [planKey]: embed }));
    setShowVideoEdit(false);
    setVideoInput("");
  };

  const handlePanoramaUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const entry = { id: Date.now(), label: panoramaLabel || "全景圖", url: ev.target.result };
      setFloorPanoramas(prev => ({ ...prev, [planKey]: [...(prev[planKey] || []), entry] }));
      setPanoramaLabel("");
      setShowPanoramaAdd(false);
      panoramaFileRef.current.value = "";
    };
    reader.readAsDataURL(file);
  };

  const [addingMarker, setAddingMarker] = useState(false); // click-to-add mode
  const [markerMode, setMarkerMode] = useState("chemical"); // "chemical" | "disaster"
  const [pendingPos, setPendingPos] = useState(null);       // { x%, y% } awaiting selection
  const [hoveredMarker, setHoveredMarker] = useState(null);
  const [selectedMarker, setSelectedMarker] = useState(null);
  const imgRef = useRef(null);
  const fileRef = useRef(null);

  // Upload floor plan image
  const handleUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { showToast("請上傳 PNG 或 JPG 圖片", "error"); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      setFloorPlans(prev => ({ ...prev, [planKey]: { url: ev.target.result, name: file.name } }));
      showToast(`${mapBuilding} ${mapFloor} 平面圖已上傳`);
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  // Click on image → record position as percentage
  const handleImgClick = (e) => {
    if (!addingMarker || !isAdminMode) return;
    const rect = imgRef.current.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    setPendingPos({ x: parseFloat(x.toFixed(2)), y: parseFloat(y.toFixed(2)), mode: markerMode });
    setAddingMarker(false);
  };

  // Save chemical marker
  const saveMarker = (chemId, label) => {
    if (!pendingPos) return;
    const marker = { id: Date.now(), x: pendingPos.x, y: pendingPos.y, chemId, label, type:"chemical" };
    setMapMarkers(prev => ({ ...prev, [planKey]: [...(prev[planKey] || []), marker] }));
    setPendingPos(null);
    showToast("標記已新增");
  };

  // Save disaster supplies marker
  const saveDisasterMarker = (label) => {
    if (!pendingPos) return;
    const marker = { id: Date.now(), x: pendingPos.x, y: pendingPos.y, chemId: null, label, type:"disaster" };
    setMapMarkers(prev => ({ ...prev, [planKey]: [...(prev[planKey] || []), marker] }));
    setPendingPos(null);
    showToast("防災物資標記已新增");
  };

  // Delete a marker
  const deleteMarker = (markerId) => {
    setMapMarkers(prev => ({
      ...prev,
      [planKey]: (prev[planKey] || []).filter(m => m.id !== markerId)
    }));
    setSelectedMarker(null);
    showToast("標記已刪除");
  };

  const getChemById = (id) => chemicals.find(c => c.id === id);

  // Chemicals on this floor (from data)
  const floorChems = chemicals.filter(c =>
    c.locations.some(l => l.building === mapBuilding && l.floor === mapFloor)
  );

  return (
    <div>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", marginBottom:16, gap:12 }}>
        <h2 style={{ margin:0, fontSize:20, color:"#f1f5f9" }}>🗺️ 大樓平面圖</h2>
        {isAdminMode && currentPlan && (
          <span style={{ fontSize:11, background:"#0c4a6e", color:"#38bdf8", padding:"3px 10px", borderRadius:20 }}>
            管理員：可上傳圖片 / 新增標記
          </span>
        )}
      </div>

      {/* Building + Floor selectors */}
      <div style={{ display:"flex", gap:16, marginBottom:16, flexWrap:"wrap" }}>
        <div>
          <div style={{ fontSize:11, color:"#64748b", marginBottom:6 }}>大樓</div>
          <div style={{ display:"flex", gap:6 }}>
            {BUILDINGS.map(b => (
              <button key={b} onClick={() => { setMapBuilding(b); setMapFloor(FLOORS_BY_BUILDING[b][0]); setAddingMarker(false); setPendingPos(null); setSelectedMarker(null); }}
                style={{ padding:"6px 12px", borderRadius:6, border:"1px solid", fontSize:12, cursor:"pointer",
                  borderColor: mapBuilding === b ? "#0ea5e9" : "#334155",
                  background: mapBuilding === b ? "#0c4a6e" : "#1e293b",
                  color: mapBuilding === b ? "#38bdf8" : "#94a3b8" }}>
                {b}
              </button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:11, color:"#64748b", marginBottom:6 }}>樓層</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {availableFloors.map(f => (
              <button key={f} onClick={() => { setMapFloor(f); setAddingMarker(false); setPendingPos(null); setSelectedMarker(null); }}
                style={{ padding:"6px 10px", borderRadius:6, border:"1px solid", fontSize:12, cursor:"pointer",
                  borderColor: mapFloor === f ? "#0ea5e9" : "#334155",
                  background: mapFloor === f ? "#0c4a6e" : "#1e293b",
                  color: mapFloor === f ? "#38bdf8" : "#94a3b8",
                  position:"relative"
                }}>
                {f}
                {floorPlans[`${mapBuilding}_${f}`] && (
                  <span style={{ position:"absolute", top:-4, right:-4, width:8, height:8, background:"#22c55e", borderRadius:"50%", fontSize:0 }} />
                )}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 290px", gap:16 }}>
        {/* Map Area */}
        <div style={{ background:"#1e293b", borderRadius:10, padding:16 }}>
          <div style={{ display:"flex", alignItems:"center", marginBottom:10, gap:8 }}>
            <span style={{ fontSize:13, color:"#94a3b8", fontWeight:600 }}>{mapBuilding} · {mapFloor}</span>
            {currentPlan && <span style={{ fontSize:11, color:"#475569" }}>· {currentPlan.name}</span>}

            <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
              {/* Upload button - always visible so anyone can see how it works, but only admin can upload */}
              <input ref={fileRef} type="file" accept="image/*" onChange={handleUpload} style={{ display:"none" }} />
              {isAdminMode && (
                <button onClick={() => fileRef.current.click()}
                  style={{ ...btnStyle(currentPlan ? "#334155" : "#0ea5e9"), fontSize:11, padding:"5px 12px" }}>
                  {currentPlan ? "🔄 更換圖片" : "📁 上傳平面圖"}
                </button>
              )}
              {isAdminMode && currentPlan && !addingMarker && (
                <button onClick={() => { setAddingMarker(true); setSelectedMarker(null); }}
                  style={{ ...btnStyle("#7c3aed"), fontSize:11, padding:"5px 12px" }}>
                  📍 新增標記
                </button>
              )}
              {addingMarker && (
                <button onClick={() => { setAddingMarker(false); setPendingPos(null); }}
                  style={{ ...btnStyle("#ef4444"), fontSize:11, padding:"5px 12px" }}>
                  ✕ 取消
                </button>
              )}
              {isAdminMode && currentPlan && (
                <button onClick={() => {
                  if (window.confirm(`確定要刪除 ${mapBuilding} ${mapFloor} 的平面圖和所有標記？`)) {
                    setFloorPlans(prev => { const n={...prev}; delete n[planKey]; return n; });
                    setMapMarkers(prev => { const n={...prev}; delete n[planKey]; return n; });
                    showToast("平面圖已刪除");
                  }
                }} style={{ ...btnStyle("#7f1d1d"), fontSize:11, padding:"5px 12px" }}>
                  🗑️
                </button>
              )}
            </div>
          </div>

          {/* Status hint when in add-marker mode */}
          {addingMarker && (
            <div style={{ background:"#7c3aed", borderRadius:6, padding:"8px 12px", marginBottom:10, fontSize:12, color:"#e9d5ff" }}>
              📍 請在下方平面圖上點擊要標記化學品的位置
            </div>
          )}

          {/* Image area */}
          {!currentPlan ? (
            /* No image uploaded yet */
            <div style={{
              border:"2px dashed #334155", borderRadius:8, minHeight:320,
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12
            }}>
              <div style={{ fontSize:48, opacity:0.3 }}>🗺️</div>
              <div style={{ fontSize:14, color:"#475569" }}>{mapBuilding} {mapFloor} 尚未上傳平面圖</div>
              {isAdminMode ? (
                <div style={{ textAlign:"center" }}>
                  <button onClick={() => fileRef.current.click()} style={{ ...btnStyle("#0ea5e9"), fontSize:13 }}>
                    📁 上傳 PNG / JPG 平面圖
                  </button>
                  <div style={{ fontSize:11, color:"#475569", marginTop:8 }}>
                    建議：先截圖或掃描各樓層平面圖再上傳
                  </div>
                </div>
              ) : (
                <div style={{ fontSize:12, color:"#475569" }}>請由管理員上傳平面圖</div>
              )}
            </div>
          ) : (
            /* Image with markers overlay */
            <div style={{ position:"relative", display:"inline-block", width:"100%", borderRadius:8, overflow:"hidden",
              cursor: addingMarker ? "crosshair" : "default", border:"1px solid #334155"
            }}>
              <img ref={imgRef} src={currentPlan.url} alt={`${mapBuilding} ${mapFloor}`}
                onClick={handleImgClick}
                style={{ width:"100%", display:"block", userSelect:"none", WebkitUserDrag:"none" }}
                draggable={false}
              />
              {/* Markers */}
              {currentMarkers.map(m => {
                const chem = getChemById(m.chemId);
                const isHov = hoveredMarker === m.id;
                const isSel = selectedMarker?.id === m.id;
                return (
                  <div key={m.id}
                    style={{ position:"absolute", left:`${m.x}%`, top:`${m.y}%`, transform:"translate(-50%,-100%)", zIndex:10, cursor:"pointer" }}
                    onMouseEnter={() => setHoveredMarker(m.id)}
                    onMouseLeave={() => setHoveredMarker(null)}
                    onClick={e => { e.stopPropagation(); setSelectedMarker(m); setAddingMarker(false); }}>
                    {/* Pin */}
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                      <div style={{
                        background: chem?.category === "毒性化學物質" ? "#ef4444" : "#f59e0b",
                        border:"2px solid #fff", borderRadius:"50% 50% 50% 0", transform:"rotate(-45deg)",
                        width: isSel ? 22 : 18, height: isSel ? 22 : 18,
                        boxShadow:"0 2px 8px rgba(0,0,0,0.5)", transition:"all 0.15s",
                        display:"flex", alignItems:"center", justifyContent:"center"
                      }}>
                        <span style={{ transform:"rotate(45deg)", fontSize: isSel ? 10 : 8 }}>⚗</span>
                      </div>
                    </div>
                    {/* Tooltip */}
                    {(isHov || isSel) && (
                      <div style={{
                        position:"absolute", bottom:"110%", left:"50%", transform:"translateX(-50%)",
                        background:"#0f172a", border:`1px solid ${chem?.category === "毒性化學物質" ? "#ef4444" : "#f59e0b"}`,
                        borderRadius:6, padding:"6px 10px", whiteSpace:"nowrap", minWidth:140,
                        boxShadow:"0 4px 12px rgba(0,0,0,0.6)", zIndex:20
                      }}>
                        <div style={{ fontSize:11, fontWeight:700, color:"#f1f5f9" }}>{m.label || chem?.name}</div>
                        {chem && <div style={{ fontSize:10, color:"#64748b" }}>{chem.id} · {chem.enName}</div>}
                        {chem && <div style={{ fontSize:10, color:"#94a3b8", marginTop:2 }}>存量：{chem.stock} {chem.unit}</div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Legend */}
          {currentPlan && (
            <div style={{ display:"flex", gap:16, marginTop:10, fontSize:11, color:"#64748b" }}>
              <span><span style={{ display:"inline-block", width:10, height:10, background:"#ef4444", borderRadius:"50%", marginRight:4 }} />毒性化學物質</span>
              <span><span style={{ display:"inline-block", width:10, height:10, background:"#f59e0b", borderRadius:"50%", marginRight:4 }} />關注化學物質</span>
              <span><span style={{ display:"inline-block", width:10, height:10, background:"#22c55e", borderRadius:2, marginRight:4 }} />防災物資</span>
              <span style={{ marginLeft:"auto" }}>標記數：{currentMarkers.length}</span>
            </div>
          )}
        </div>

        {/* Right panel */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

          {/* Pending: choose chemical to mark */}
          {pendingPos && (
            <div style={{ background: pendingPos.mode === "disaster" ? "#14532d" : "#1e3a5f", borderRadius:10, padding:14,
              border:`1px solid ${pendingPos.mode === "disaster" ? "#22c55e" : "#0ea5e9"}` }}>
              {pendingPos.mode === "disaster" ? (<>
                <div style={{ fontSize:12, fontWeight:700, color:"#86efac", marginBottom:10 }}>🛡️ 設定防災物資標記</div>
                <div style={{ fontSize:11, color:"#64748b", marginBottom:8 }}>位置：({pendingPos.x}%, {pendingPos.y}%)</div>
                {[
                  "滅火器","急救箱/AED","防護裝備（PPE）",
                  "防溢圍堵材料","緊急沖眼站","防毒面具",
                  "緊急應變箱","消防栓","緊急出口指示"
                ].map(label => (
                  <button key={label} onClick={() => saveDisasterMarker(label)}
                    style={{ display:"block", width:"100%", textAlign:"left", padding:"7px 10px", background:"#0f172a",
                      border:"1px solid #16a34a33", borderRadius:6, color:"#e2e8f0", cursor:"pointer", fontSize:12, marginBottom:4 }}
                    onMouseEnter={e => e.currentTarget.style.background="#1e293b"}
                    onMouseLeave={e => e.currentTarget.style.background="#0f172a"}>
                    🛡️ {label}
                  </button>
                ))}
              </>) : (<>
                <div style={{ fontSize:12, fontWeight:700, color:"#38bdf8", marginBottom:10 }}>📍 選擇要標記的化學品</div>
                <div style={{ fontSize:11, color:"#64748b", marginBottom:8 }}>位置：({pendingPos.x}%, {pendingPos.y}%)</div>
                <div style={{ maxHeight:220, overflow:"auto", display:"flex", flexDirection:"column", gap:4 }}>
                  {chemicals.map(c => (
                    <button key={c.id} onClick={() => saveMarker(c.id, c.name)}
                      style={{ textAlign:"left", padding:"7px 10px", background:"#0f172a", border:`1px solid ${getCategoryColor(c.category)}33`,
                        borderRadius:6, color:"#e2e8f0", cursor:"pointer", fontSize:12 }}
                      onMouseEnter={e => e.currentTarget.style.background="#1e293b"}
                      onMouseLeave={e => e.currentTarget.style.background="#0f172a"}>
                      <span style={{ color: getCategoryColor(c.category) }}>●</span> {c.name}
                      <span style={{ color:"#475569", fontSize:10, marginLeft:6 }}>{c.id}</span>
                    </button>
                  ))}
                </div>
              </>)}
              <button onClick={() => setPendingPos(null)} style={{ ...btnStyle("#334155"), width:"100%", marginTop:8, fontSize:11 }}>取消</button>
            </div>
          )}

          {/* Selected marker detail */}
          {selectedMarker && !pendingPos && (() => {
            const chem = getChemById(selectedMarker.chemId);
            return (
              <div style={{ background:"#1e293b", borderRadius:10, padding:14, border:`1px solid ${getCategoryColor(chem?.category || "")}` }}>
                <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:"#f1f5f9" }}>{selectedMarker.label}</span>
                  <button onClick={() => setSelectedMarker(null)} style={{ marginLeft:"auto", background:"none", border:"none", color:"#64748b", cursor:"pointer" }}>✕</button>
                </div>
                {chem && (
                  <>
                    <div style={{ fontSize:11, color:"#64748b" }}>{chem.id} · {chem.enName}</div>
                    <div style={{ fontSize:11, color:"#94a3b8", marginTop:6 }}>
                      存量：<span style={{ color: getStockColor(chem.stock, chem.maxStock) }}>{chem.stock} {chem.unit}</span> / {chem.maxStock} {chem.unit}
                    </div>
                    <div style={{ display:"flex", gap:4, marginTop:6, flexWrap:"wrap" }}>
                      {chem.hazard.map(h => <span key={h} style={{ fontSize:11 }}>{GHS_SYMBOLS[h]}</span>)}
                    </div>
                    <div style={{ display:"flex", gap:6, marginTop:10 }}>
                      <button onClick={() => { setSelectedChem(chem); setShowChemDetail(true); }}
                        style={{ ...btnStyle("#0ea5e9"), flex:1, fontSize:11, padding:"5px 0" }}>詳細資訊</button>
                      {isAdminMode && (
                        <button onClick={() => deleteMarker(selectedMarker.id)}
                          style={{ ...btnStyle("#7f1d1d"), flex:1, fontSize:11, padding:"5px 0" }}>刪除標記</button>
                      )}
                    </div>
                  </>
                )}
              </div>
            );
          })()}

          {/* Floor chemical list */}
          <div style={{ background:"#1e293b", borderRadius:10, padding:14, flex:1, overflow:"auto" }}>
            <div style={{ fontSize:12, fontWeight:600, color:"#94a3b8", marginBottom:10 }}>
              此樓層化學品紀錄 ({floorChems.length})
            </div>
            {floorChems.length === 0 ? (
              <div style={{ fontSize:12, color:"#475569", textAlign:"center", padding:20 }}>
                此樓層無化學品記錄
              </div>
            ) : floorChems.map(c => (
              <div key={c.id} onClick={() => { setSelectedChem(c); setShowChemDetail(true); }}
                style={{ padding:"8px 10px", background:"#0f172a", borderRadius:6, marginBottom:6, cursor:"pointer",
                  borderLeft:`3px solid ${getCategoryColor(c.category)}` }}
                onMouseEnter={e => e.currentTarget.style.background = "#172032"}
                onMouseLeave={e => e.currentTarget.style.background = "#0f172a"}>
                <div style={{ fontSize:12, fontWeight:600, color:"#e2e8f0" }}>{c.name}</div>
                <div style={{ fontSize:10, color:"#64748b" }}>{c.id}</div>
                <div style={{ fontSize:10, color:"#94a3b8", marginTop:2 }}>存量：{c.stock} {c.unit}</div>
              </div>
            ))}
          </div>

          {/* Upload hint for non-admin */}
          {!isAdminMode && (
            <div style={{ background:"#1e293b", borderRadius:8, padding:12, fontSize:11, color:"#475569", textAlign:"center" }}>
              🔒 請以管理員身份登入<br />以上傳平面圖及新增標記
            </div>
          )}

          {/* ── YouTube 影片 ── */}
          <div style={{ background:"#1e293b", borderRadius:10, padding:14 }}>
            <div style={{ display:"flex", alignItems:"center", marginBottom:currentVideo ? 10 : 0 }}>
              <span style={{ fontSize:12, fontWeight:600, color:"#94a3b8" }}>🎬 樓層影片</span>
              {isAdminMode && (
                <button onClick={() => { setShowVideoEdit(v => !v); setVideoInput(currentVideo); }}
                  style={{ marginLeft:"auto", fontSize:11, background:"#334155", border:"none",
                    color:"#94a3b8", borderRadius:4, padding:"3px 8px", cursor:"pointer" }}>
                  {currentVideo ? "✏️ 更換" : "＋ 新增"}
                </button>
              )}
              {isAdminMode && currentVideo && (
                <button onClick={() => setFloorVideos(prev => ({ ...prev, [planKey]:"" }))}
                  style={{ marginLeft:4, fontSize:11, background:"#7f1d1d", border:"none",
                    color:"#fca5a5", borderRadius:4, padding:"3px 8px", cursor:"pointer" }}>
                  刪除
                </button>
              )}
            </div>
            {showVideoEdit && (
              <div style={{ marginTop:8 }}>
                <input value={videoInput} onChange={e => setVideoInput(e.target.value)}
                  placeholder="貼上 YouTube 網址..."
                  style={{ width:"100%", background:"#0f172a", border:"1px solid #334155",
                    color:"#e2e8f0", borderRadius:6, padding:"6px 10px", fontSize:12, boxSizing:"border-box" }} />
                <div style={{ display:"flex", gap:6, marginTop:6 }}>
                  <button onClick={saveVideo} style={{ ...btnStyle("#dc2626"), flex:1, fontSize:11, padding:"5px 0" }}>儲存</button>
                  <button onClick={() => setShowVideoEdit(false)} style={{ ...btnStyle("#334155"), flex:1, fontSize:11, padding:"5px 0" }}>取消</button>
                </div>
              </div>
            )}
            {currentVideo ? (
              <div style={{ marginTop:8, borderRadius:8, overflow:"hidden", position:"relative", paddingBottom:"56.25%", height:0 }}>
                <iframe src={currentVideo} title="樓層影片"
                  style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", border:"none" }}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen />
              </div>
            ) : !showVideoEdit && (
              <div style={{ fontSize:11, color:"#475569", marginTop:6, textAlign:"center" }}>
                尚未設定影片
              </div>
            )}
          </div>

          {/* ── 全景圖 ── */}
          <div style={{ background:"#1e293b", borderRadius:10, padding:14 }}>
            <div style={{ display:"flex", alignItems:"center", marginBottom:8 }}>
              <span style={{ fontSize:12, fontWeight:600, color:"#94a3b8" }}>🔭 全景圖</span>
              {isAdminMode && (
                <button onClick={() => setShowPanoramaAdd(v => !v)}
                  style={{ marginLeft:"auto", fontSize:11, background:"#334155", border:"none",
                    color:"#94a3b8", borderRadius:4, padding:"3px 8px", cursor:"pointer" }}>
                  ＋ 上傳
                </button>
              )}
            </div>
            {showPanoramaAdd && (
              <div style={{ marginBottom:10, padding:10, background:"#0f172a", borderRadius:8 }}>
                <input value={panoramaLabel} onChange={e => setPanoramaLabel(e.target.value)}
                  placeholder="名稱（例：走廊、研究室）"
                  style={{ width:"100%", background:"#1e293b", border:"1px solid #334155",
                    color:"#e2e8f0", borderRadius:6, padding:"6px 10px", fontSize:12,
                    boxSizing:"border-box", marginBottom:6 }} />
                <input ref={panoramaFileRef} type="file" accept="image/*" onChange={handlePanoramaUpload} style={{ display:"none" }} />
                <button onClick={() => panoramaFileRef.current.click()}
                  style={{ ...btnStyle("#0ea5e9"), width:"100%", fontSize:11, padding:"6px 0" }}>
                  📁 選擇全景圖片
                </button>
                <button onClick={() => setShowPanoramaAdd(false)}
                  style={{ ...btnStyle("#334155"), width:"100%", fontSize:11, padding:"5px 0", marginTop:4 }}>
                  取消
                </button>
              </div>
            )}
            {currentPanoramas.length === 0 ? (
              <div style={{ fontSize:11, color:"#475569", textAlign:"center" }}>尚未上傳全景圖</div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {currentPanoramas.map(p => (
                  <div key={p.id} style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <button onClick={() => setPanoramaModal(p)}
                      style={{ flex:1, textAlign:"left", padding:"7px 10px", background:"#0f172a",
                        border:"1px solid #0ea5e933", borderRadius:6, color:"#38bdf8",
                        cursor:"pointer", fontSize:12 }}
                      onMouseEnter={e => e.currentTarget.style.background="#172032"}
                      onMouseLeave={e => e.currentTarget.style.background="#0f172a"}>
                      🔭 {p.label}
                    </button>
                    {isAdminMode && (
                      <button onClick={() => setFloorPanoramas(prev => ({
                        ...prev, [planKey]: (prev[planKey]||[]).filter(x => x.id !== p.id)
                      }))} style={{ background:"#7f1d1d", border:"none", color:"#fca5a5",
                        borderRadius:4, padding:"4px 8px", cursor:"pointer", fontSize:11 }}>✕</button>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── 全景圖 Modal ── */}
      {panoramaModal && (
        <div onClick={() => setPanoramaModal(null)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", zIndex:1000,
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
          <div style={{ width:"90vw", maxWidth:900 }} onClick={e => e.stopPropagation()}>
            <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>
              <span style={{ fontSize:15, fontWeight:700, color:"#f1f5f9" }}>🔭 {panoramaModal.label}</span>
              <button onClick={() => setPanoramaModal(null)}
                style={{ marginLeft:"auto", background:"#334155", border:"none", color:"#fff",
                  borderRadius:6, padding:"6px 14px", cursor:"pointer", fontSize:13 }}>✕ 關閉</button>
            </div>
            {/* 全景圖：左右滾動瀏覽 */}
            <div style={{ borderRadius:10, overflow:"hidden", background:"#0f172a",
              position:"relative" }}>
              <div style={{ overflowX:"auto", overflowY:"hidden", cursor:"grab",
                WebkitOverflowScrolling:"touch" }}>
                <img src={panoramaModal.url} alt={panoramaModal.label}
                  style={{ height:"60vh", width:"auto", maxWidth:"none", display:"block",
                    userSelect:"none", WebkitUserDrag:"none" }}
                  draggable={false} />
              </div>
              <div style={{ position:"absolute", bottom:10, left:"50%", transform:"translateX(-50%)",
                background:"rgba(0,0,0,0.6)", color:"#94a3b8", fontSize:11,
                padding:"4px 12px", borderRadius:20, pointerEvents:"none" }}>
                ← 左右滑動瀏覽全景 →
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Campus Map Page ─────────────────────────────────────────────────────────
const BUILDING_ZONES = [
  { name:"感恩樓", color:"#16a34a", accent:"#86efac",
    grid:{ col:1, row:1, colSpan:1, rowSpan:1 } },
  { name:"協力樓", color:"#b45309", accent:"#fbbf24",
    grid:{ col:2, row:1, colSpan:1, rowSpan:1 } },
  { name:"大愛樓", color:"#1d4ed8", accent:"#93c5fd",
    grid:{ col:1, row:2, colSpan:1, rowSpan:1 } },
  { name:"合心樓", color:"#7c3aed", accent:"#c4b5fd",
    grid:{ col:2, row:2, colSpan:1, rowSpan:1 } },
];

function IsoPage({ chemicals, setSelectedChem, setShowChemDetail, setPage, setMapBuilding, setMapFloor }) {
  const [hoveredBuilding, setHoveredBuilding] = useState(null);

  const getBuildingChemCount = (bName) =>
    chemicals.filter(c => c.locations.some(l => l.building === bName)).length;

  const handleBuildingClick = (b) => {
    const FLOORS = {
      "大愛樓": ["B1F","1F","2F","3F","5F","6F","7F"],
      "感恩樓": ["B1F","1F","2F","3F","5F","6F","7F","8F","9F","10F","11F"],
      "合心樓": ["B1F","1F","2F","3F","5F","6F","7F","8F","9F","10F","11F"],
      "協力樓": ["B1F","1F","2F","3F","5F","6F","7F","8F","9F","10F","11F"],
    };
    const chems = chemicals.filter(c => c.locations.some(l => l.building === b.name));
    const usedFloors = [...new Set(chems.flatMap(c => c.locations.filter(l=>l.building===b.name).map(l=>l.floor)))];
    const firstFloor = usedFloors[0] || FLOORS[b.name]?.[0] || "1F";
    setMapBuilding(b.name);
    setMapFloor(firstFloor);
    setPage("map");
  };

  return (
    <div>
      <h2 style={{ margin:"0 0 4px", fontSize:20, color:"#f1f5f9" }}>🏥 花蓮慈濟醫院 院區配置</h2>
      <p style={{ margin:"0 0 16px", fontSize:13, color:"#64748b" }}>點擊大樓可跳轉至該棟平面圖與化學品分佈</p>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 260px", gap:16, alignItems:"start" }}>

        {/* ── 示意圖 ── */}
        <div style={{ background:"#1e293b", borderRadius:12, padding:20 }}>

          {/* 西側標示（上方） */}
          <div style={{ borderBottom:"2px dashed #334155", paddingBottom:4, marginBottom:8,
            fontSize:11, color:"#475569", textAlign:"center", letterSpacing:2 }}>
            西
          </div>

          {/* 格局主體 + 右側中山路 */}
          <div style={{ display:"flex", alignItems:"stretch", gap:6 }}>
            <div style={{ flex:1, display:"grid", gridTemplateColumns:"1fr 1fr",
              gridTemplateRows:"1fr 1fr", gap:10, minHeight:280 }}>
              {BUILDING_ZONES.map(b => {
                const count = getBuildingChemCount(b.name);
                const isHov = hoveredBuilding === b.name;
                const g = b.grid;
                return (
                  <div key={b.name}
                    onClick={() => handleBuildingClick(b)}
                    onMouseEnter={() => setHoveredBuilding(b.name)}
                    onMouseLeave={() => setHoveredBuilding(null)}
                    style={{
                      gridColumn:`${g.col} / span ${g.colSpan}`,
                      gridRow:`${g.row} / span ${g.rowSpan}`,
                      border:`2px solid ${isHov ? b.accent : b.color}`,
                      background: isHov ? `${b.color}28` : `${b.color}12`,
                      borderRadius:10, cursor:"pointer",
                      transition:"all 0.18s",
                      display:"flex", flexDirection:"column",
                      alignItems:"center", justifyContent:"center",
                      gap:8, padding:12,
                      boxShadow: isHov ? `0 0 0 3px ${b.color}44` : "none",
                    }}>
                    <div style={{
                      fontSize:16, fontWeight:800, color: isHov ? b.accent : "#e2e8f0",
                      letterSpacing:2, textShadow: isHov ? `0 0 12px ${b.color}` : "none"
                    }}>
                      {b.name}
                    </div>
                    {count > 0 ? (
                      <div style={{
                        background:"#ef444422", border:"1px solid #ef4444",
                        color:"#f87171", fontSize:11, fontWeight:700,
                        padding:"3px 10px", borderRadius:20
                      }}>
                        ⚗ {count} 種化學品
                      </div>
                    ) : (
                      <div style={{ fontSize:11, color:"#334155" }}>無化學品</div>
                    )}
                    {isHov && (
                      <div style={{ fontSize:10, color:b.accent, opacity:0.9 }}>點擊查看平面圖 →</div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* 右側：中山路（北） */}
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center",
              justifyContent:"center", paddingLeft:6, borderLeft:"2px dashed #334155" }}>
              <span style={{ fontSize:11, color:"#475569", writingMode:"vertical-rl",
                letterSpacing:2 }}>中山路（北）</span>
            </div>
          </div>

          {/* 下方：中央路三段（東） */}
          <div style={{ borderTop:"2px dashed #334155", marginTop:8, paddingTop:4,
            fontSize:11, color:"#475569", letterSpacing:1, textAlign:"center" }}>
            中央路三段（東）
          </div>
          <div style={{ fontSize:11, color:"#475569", marginTop:6, textAlign:"center" }}>
            點擊大樓可跳轉至平面圖
          </div>
        </div>

        {/* ── 大樓資訊卡 ── */}
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {BUILDING_ZONES.map(b => {
            const chems = chemicals.filter(c => c.locations.some(l => l.building === b.name));
            const rooms = [...new Set(chems.flatMap(c => c.locations.filter(l=>l.building===b.name).map(l=>l.room)))];
            return (
              <div key={b.name} onClick={() => handleBuildingClick(b)}
                style={{
                  background:"#0f172a", borderRadius:10, padding:"12px 14px",
                  borderLeft:`3px solid ${b.color}`, cursor:"pointer",
                  transition:"transform 0.15s, box-shadow 0.15s"
                }}
                onMouseEnter={e => { e.currentTarget.style.transform="translateX(3px)"; e.currentTarget.style.boxShadow=`-3px 0 0 ${b.color}`; }}
                onMouseLeave={e => { e.currentTarget.style.transform="none"; e.currentTarget.style.boxShadow="none"; }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:14, fontWeight:700, color:b.accent }}>{b.name}</span>

];

function DeclarationsPage({ declarations, setDeclarations, chemicals, isAdminMode, showToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [filterMonth, setFilterMonth] = useState("");
  const [filterChem, setFilterChem] = useState("");
  const [expandedId, setExpandedId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editData, setEditData] = useState({});
  const fileInputRef = useRef(null);
  const editFileRef = useRef(null);

  const EMPTY = {
    chemicalId:"", location:"", yearMonth:"",
    prevBalance:"", useAmount:"", balance:"", unit:"公克",
    permitNo:"", controlNo:"", note:"",
    fileName:"", fileData:""
  };
  const [form, setForm] = useState(EMPTY);

  const inputS = { background:"#0f172a", border:"1px solid #334155", color:"#e2e8f0",
    borderRadius:6, padding:"7px 10px", fontSize:12, width:"100%", boxSizing:"border-box" };
  const labelS = { fontSize:11, color:"#64748b", marginBottom:3, display:"block" };

  const allMonths = [...new Set(declarations.map(d => d.yearMonth))].sort().reverse();

  const filtered = declarations.filter(d =>
    (!filterMonth || d.yearMonth === filterMonth) &&
    (!filterChem  || d.chemicalId === filterChem)
  );

  // Group by yearMonth
  const groups = allMonths
    .filter(m => !filterMonth || m === filterMonth)
    .map(m => ({
      month: m,
      records: filtered.filter(d => d.yearMonth === m)
    })).filter(g => g.records.length > 0);

  const getChemName = id => chemicals.find(c => c.id === id)?.name || id;

  // Read file for new form
  const handleFile = (e, isEdit=false) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      if (isEdit) setEditData(prev => ({ ...prev, fileName: file.name, fileData: ev.target.result }));
      else setForm(prev => ({ ...prev, fileName: file.name, fileData: ev.target.result }));
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const saveNew = () => {
    if (!form.chemicalId || !form.yearMonth || !form.location) {
      showToast("請填寫：管制編號、月份、運作場所", "error"); return;
    }
    setDeclarations(prev => [...prev, { ...form, id: Date.now(),
      prevBalance: parseFloat(form.prevBalance)||0,
      useAmount:   parseFloat(form.useAmount)||0,
      balance:     parseFloat(form.balance)||0,
    }]);
    setForm(EMPTY);
    setShowAdd(false);
    showToast("申報紀錄已新增");
  };

  const startEdit = d => { setEditingId(d.id); setEditData({...d}); };
  const saveEdit = () => {
    setDeclarations(prev => prev.map(r => r.id === editingId
      ? { ...editData, prevBalance:parseFloat(editData.prevBalance)||0,
          useAmount:parseFloat(editData.useAmount)||0, balance:parseFloat(editData.balance)||0 }
      : r));
    setEditingId(null);
    showToast("已儲存");
  };

  const downloadFile = (fileData, fileName) => {
    const a = document.createElement("a");
    a.href = fileData;
    a.download = fileName;
    a.click();
  };

  const stats = {
    total: declarations.length,
    chems: new Set(declarations.map(d => d.chemicalId)).size,
    months: allMonths.length,
    withFile: declarations.filter(d => d.fileData).length,
  };

  return (
    <div>
      {/* 標題列 */}
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        <h2 style={{ margin:0, fontSize:20, color:"#f1f5f9" }}>📝 申報紀錄</h2>

        {/* 篩選 */}
        <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)}
          style={{ ...inputS, width:130, marginLeft:8 }}>
          <option value="">全部月份</option>
          {allMonths.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
        <select value={filterChem} onChange={e => setFilterChem(e.target.value)}
          style={{ ...inputS, width:160 }}>
          <option value="">全部化學品</option>
          {chemicals.map(c => <option key={c.id} value={c.id}>{c.id} {c.name}</option>)}
        </select>

        <a href="https://cems.moenv.gov.tw" target="_blank" rel="noreferrer"
          style={{ marginLeft:"auto", fontSize:12, color:"#38bdf8", textDecoration:"none",
            border:"1px solid #334155", padding:"6px 12px", borderRadius:6 }}>
          🌐 毒化物管理系統 ↗
        </a>
        <button onClick={() => setShowAdd(v => !v)}
          style={{ background:"#0ea5e9", border:"none", color:"#fff", borderRadius:6,
            padding:"6px 14px", cursor:"pointer", fontSize:12, fontWeight:600 }}>
          ＋ 新增紀錄
        </button>
      </div>

      {/* 統計卡 */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:20 }}>
        {[
          { label:"總筆數",   value:stats.total,    color:"#38bdf8", icon:"📋" },
          { label:"品項數",   value:stats.chems,    color:"#a78bfa", icon:"⚗"  },
          { label:"月份數",   value:stats.months,   color:"#94a3b8", icon:"📅" },
          { label:"已附電子檔", value:stats.withFile, color:"#22c55e", icon:"📎" },
        ].map(s => (
          <div key={s.label} style={{ background:"#1e293b", borderRadius:10, padding:"14px 16px",
            borderTop:`3px solid ${s.color}` }}>
            <div style={{ fontSize:22, fontWeight:800, color:s.color }}>{s.icon} {s.value}</div>
            <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* 新增表單 */}
      {showAdd && (
        <div style={{ background:"#1e293b", borderRadius:10, padding:18, marginBottom:16, border:"1px solid #334155" }}>
          <div style={{ fontSize:14, fontWeight:700, color:"#f1f5f9", marginBottom:14 }}>＋ 新增申報紀錄</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>

            {/* 必填欄位 */}
            <div>
              <label style={labelS}>管制編號 *</label>
              <select value={form.chemicalId} onChange={e => {
                const cid = e.target.value;
                const prev = form.location ? [...declarations]
                  .filter(d => d.chemicalId === cid && d.location === form.location)
                  .sort((a,b) => b.yearMonth.localeCompare(a.yearMonth))[0] : null;
                setForm(f => ({...f, chemicalId:cid,
                  prevBalance: prev ? prev.balance : f.prevBalance,
                  unit: prev ? prev.unit : f.unit,
                }));
              }} style={inputS}>
                <option value="">選擇化學品</option>
                {chemicals.map(c => <option key={c.id} value={c.id}>{c.id} {c.name}</option>)}
              </select>
            </div>
            <div>
              <label style={labelS}>記錄月份 *</label>
              <input type="month" value={form.yearMonth} onChange={e => setForm({...form,yearMonth:e.target.value})} style={inputS} />
            </div>
            <div>
              <label style={labelS}>運作場所 *</label>
              <select value={form.location} onChange={e => {
                const loc = e.target.value;

                const prev = [...declarations]

                <select value={form.unit} onChange={e => setForm({...form,unit:e.target.value})} style={{...inputS, flex:1}}>

            <div>

              <div style={{ display:"flex", alignItems:"center", gap:8 }}>

              <button onClick={() => fileInputRef.current.click()}

                          </div>

                          </div>

                          <div>
                            <label style={labelS}>單位</label>
                            <select value={editData.unit||"公克"} onChange={e => setEditData({...editData,unit:e.target.value})} style={inS}>

                          </div>
                          <div>

                          {editData.fileData ? (
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <span style={{ fontSize:11, color:"#22c55e" }}>📎 {editData.fileName}</span>
                              <button onClick={() => setEditData({...editData,fileName:"",fileData:""})}
                                style={{ fontSize:10, background:"#7f1d1d", border:"none", color:"#fca5a5",
                                  borderRadius:4, padding:"2px 6px", cursor:"pointer" }}>移除</button>
                              <button onClick={() => editFileRef.current.click()}
                                style={{ fontSize:10, background:"#334155", border:"none", color:"#94a3b8",
                                  borderRadius:4, padding:"2px 6px", cursor:"pointer" }}>更換</button>
                            </div>
                          ) : (
                            <button onClick={() => editFileRef.current.click()}
                              style={{ fontSize:11, background:"#1e293b", border:"1px solid #334155",
                                color:"#94a3b8", borderRadius:6, padding:"5px 12px", cursor:"pointer" }}>
                              📁 附上電子檔
                            </button>
                          )}

                        <div style={{ display:"flex", gap:6 }}>
                          <button onClick={saveEdit} style={{ fontSize:12, background:"#16a34a", border:"none",

                            <span style={{ fontSize:11, color:"#475569" }}>{d.chemicalId}</span>
                            <span style={{ fontSize:11, color:"#64748b" }}>📍 {d.location}</span>

                            <span style={{ color:"#94a3b8" }}>本月使用：<b style={{color:"#fbbf24"}}>{d.useAmount} {d.unit}</b></span>
                            <span style={{ color:"#94a3b8" }}>結餘量：<b style={{color:"#a78bfa"}}>{d.balance} {d.unit}</b></span>
                            {d.permitNo && <span style={{ color:"#475569" }}>{d.permitNo}</span>}
                            {d.note && <span style={{ color:"#475569" }}>備註：{d.note}</span>}
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:6, alignItems:"center", flexShrink:0 }}>
                          {d.fileData && (
                            <button onClick={() => downloadFile(d.fileData, d.fileName)}
                              style={{ fontSize:11, background:"#14532d", border:"1px solid #16a34a",
                                color:"#86efac", borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>
                              📎 {d.fileName?.split('.').pop()?.toUpperCase()}
                            </button>
                          )}
                          <button onClick={() => startEdit(d)}
                            style={{ fontSize:11, background:"#1e3a5f", border:"none",
                              color:"#93c5fd", borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>✏️</button>
                          <button onClick={() => {
                            if (window.confirm("確定刪除？")) {
                              setDeclarations(prev => prev.filter(x => x.id !== d.id));
                              showToast("已刪除");
                            }
                          }} style={{ fontSize:11, background:"#7f1d1d", border:"none",
                            color:"#fca5a5", borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>刪除</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── Chemical Detail Modal ─────────────────────────────────────────────────────
function ChemDetailModal({ chem, onClose, isAdminMode, chemicals, setChemicals, showToast }) {

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
        {[
          { label:"品項代碼", value:chem.id },
          { label:"中文名稱", value:chem.name },
          { label:"英文名稱", value:chem.enName },
          { label:"化學品類別", value:chem.category },
          { label:"CAS 編號", value:chem.cas },
          { label:"UN 編號", value:chem.un },
        ].map(f => (
          <div key={f.label} style={{ background:"#0f172a", borderRadius:6, padding:"8px 12px" }}>
            <div style={{ fontSize:10, color:"#64748b" }}>{f.label}</div>
            <div style={{ fontSize:13, color:"#e2e8f0", marginTop:2 }}>{f.value}</div>

          <span style={{ fontSize:12, color:"#64748b" }}>目前存量</span>

            <button onClick={() => setEditStock(true)} style={{ marginLeft:"auto", fontSize:10, background:"none", border:"none", color:"#38bdf8", cursor:"pointer" }}>✏️ 修改</button>
          )}
        </div>
        {editStock ? (
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <input type="number" value={newStock} onChange={e => setNewStock(parseFloat(e.target.value))}
              style={{ ...inputStyle, width:80 }} />

            <button onClick={() => {
              setChemicals(prev => prev.map(c => c.id === chem.id ? {...c, stock:newStock} : c));
              setEditStock(false);
              showToast("存量已更新");

            <button onClick={() => setEditStock(false)} style={btnStyle("#334155")}>取消</button>
          </div>

          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16, fontWeight:700, color: getStockColor(chem.stock, chem.maxStock) }}>
              {chem.stock} {chem.unit}
            </span>
            <span style={{ fontSize:12, color:"#64748b" }}>/ 上限 {chem.maxStock} {chem.unit}</span>
            <div style={{ flex:1, background:"#1e293b", borderRadius:4, height:8 }}>
              <div style={{ height:"100%", background: getStockColor(chem.stock, chem.maxStock), borderRadius:4, width:`${Math.min((chem.stock / chem.maxStock) * 100, 100)}%` }} />
            </div>
          </div>
        )}
      </div>

      <div style={{ marginBottom:12 }}>
        <div style={{ fontSize:11, color:"#64748b", marginBottom:6 }}>GHS 危害標示</div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {chem.hazard.map(h => (
            <div key={h} style={{ textAlign:"center", padding:"6px 10px", background:"#0f172a", borderRadius:6 }}>
              <div style={{ fontSize:20 }}>{GHS_SYMBOLS[h]}</div>
              <div style={{ fontSize:9, color:"#f59e0b", marginTop:2 }}>{h}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        <div style={{ background:"#0f172a", borderRadius:6, padding:"10px 12px" }}>
          <div style={{ fontSize:11, color:"#64748b", marginBottom:6 }}>🛡️ 防護裝備</div>
          {chem.emergencyEquip.map(e => <div key={e} style={{ fontSize:11, color:"#e2e8f0", padding:"2px 0" }}>✓ {e}</div>)}
        </div>
        <div style={{ background:"#0f172a", borderRadius:6, padding:"10px 12px" }}>
          <div style={{ fontSize:11, color:"#64748b", marginBottom:6 }}>📍 存放位置</div>
          {chem.locations.map((l, i) => (
            <div key={i} style={{ fontSize:11, color:"#e2e8f0", padding:"2px 0" }}>🏢 {l.building} {l.floor} · {l.room}</div>
          ))}
        </div>
      </div>
    </Modal>
  );
}

const TRAINING_TYPES = ["演練","教育訓練","宣導","複習測驗"];
const INITIAL_TRAINING_FORM = {
  date:"", type:"演練", title:"", location:"",
  duration:"", instructor:"", result:"通過", note:""
};

function TrainingPage({ records, setRecords, isAdminMode, showToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editData, setEditData] = useState({});
  const [form, setForm] = useState(INITIAL_TRAINING_FORM);
  const [filterType, setFilterType] = useState("");

  const filtered = filterType ? records.filter(r => r.type === filterType) : records;

  const inputS = { background:"#0f172a", border:"1px solid #334155", color:"#e2e8f0",
    borderRadius:6, padding:"7px 10px", fontSize:12, width:"100%", boxSizing:"border-box" };
  const labelS = { fontSize:11, color:"#64748b", marginBottom:4, display:"block" };

  const typeColor = (t) => ({
    "演練":     { bg:"#7c3aed22", border:"#7c3aed", color:"#c4b5fd" },
    "教育訓練": { bg:"#1d4ed822", border:"#3b82f6", color:"#93c5fd" },
    "宣導":     { bg:"#0369a122", border:"#0ea5e9", color:"#7dd3fc" },
    "複習測驗": { bg:"#15803d22", border:"#22c55e", color:"#86efac" },
  }[t] || { bg:"#33415522", border:"#475569", color:"#94a3b8" });

  const saveNew = () => {
    if (!form.date || !form.title || !form.location) { showToast("請填寫日期、標題、地點", "error"); return; }
    setRecords(prev => [...prev, { ...form, id: Date.now(),
      duration: parseInt(form.duration)||0 }]);
    setForm(INITIAL_TRAINING_FORM);
    setShowAdd(false);
    showToast("紀錄已新增");
  };

  const startEdit = (r) => { setEditingId(r.id); setEditData({...r}); };
  const saveEdit = () => {
    setRecords(prev => prev.map(r => r.id === editingId
      ? { ...editData, duration: parseInt(editData.duration)||0 }
      : r));
    setEditingId(null);
    showToast("已儲存");
  };

  const stats = {
    total: records.length,
    drills: records.filter(r => r.type === "演練").length,
    training: records.filter(r => r.type === "教育訓練").length,

  };

  return (
    <div>
      {/* Title */}
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16, flexWrap:"wrap" }}>

        {/* Type filter */}
        <select value={filterType} onChange={e => setFilterType(e.target.value)}
          style={{ ...inputS, width:120, marginLeft:8 }}>
          <option value="">全部類型</option>
          {TRAINING_TYPES.map(t => <option key={t}>{t}</option>)}
        </select>
        {isAdminMode && (
          <button onClick={() => setShowAdd(v => !v)}
            style={{ marginLeft:"auto", background:"#0ea5e9", border:"none", color:"#fff",
              borderRadius:6, padding:"6px 14px", cursor:"pointer", fontSize:12, fontWeight:600 }}>
            ＋ 新增紀錄
          </button>
        )}
      </div>

      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:20 }}>
        {[
          { label:"總紀錄數", value:stats.total,    color:"#38bdf8",  icon:"📋" },
          { label:"演練次數", value:stats.drills,   color:"#c4b5fd",  icon:"🚨" },
          { label:"教育訓練", value:stats.training, color:"#93c5fd",  icon:"📖" },

        ].map(s => (
          <div key={s.label} style={{ background:"#1e293b", borderRadius:10, padding:"14px 16px",
            borderTop:`3px solid ${s.color}` }}>
            <div style={{ fontSize:22, fontWeight:800, color:s.color }}>{s.icon} {s.value}</div>
            <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{s.label}</div>

        ))}

      {/* Add Form */}

        <div style={{ background:"#1e293b", borderRadius:10, padding:18, marginBottom:16, border:"1px solid #334155" }}>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
            {[
              ["日期 *", "date", "date"],
              ["類型", "type", "typeSelect"],
              ["標題 *", "title", "text"],
              ["地點 *", "location", "text"],
              ["時數（分鐘）", "duration", "number"],
              ["主辦/講師", "instructor", "text"],
              ["結果", "result", "resultSelect"],
              ["備註", "note", "text"],
            ].map(([label, field, type]) => (
              <div key={field}>
                <label style={labelS}>{label}</label>
                {type === "typeSelect" ? (
                  <select value={form[field]} onChange={e => setForm({...form,[field]:e.target.value})} style={inputS}>
                    {TRAINING_TYPES.map(t => <option key={t}>{t}</option>)}
                  </select>
                ) : type === "resultSelect" ? (
                  <select value={form[field]} onChange={e => setForm({...form,[field]:e.target.value})} style={inputS}>

            <button onClick={() => { setShowAdd(false); setForm(INITIAL_TRAINING_FORM); }}

                    <th key={h} style={{ padding:"10px 12px", textAlign:"left", color:"#64748b",
                      fontWeight:500, fontSize:11, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
              </tr>
            </thead>
            <tbody>
              {filtered.sort((a,b) => b.date.localeCompare(a.date)).map(r => {
                const isEditing = editingId === r.id;
                const tc = typeColor(r.type);
                const inS = { background:"#0f172a", border:"1px solid #334155", color:"#e2e8f0",
                  borderRadius:4, padding:"2px 6px", fontSize:11, width:"100%", boxSizing:"border-box" };
                return (
                  <tr key={r.id} style={{ borderBottom:"1px solid #1e3a5f" }}
                    onMouseEnter={e => { if(!isEditing) e.currentTarget.style.background="#0f172a40"; }}
                    onMouseLeave={e => { e.currentTarget.style.background="transparent"; }}>

                    <td style={{ padding:"10px 12px", color:"#94a3b8", minWidth:95, whiteSpace:"nowrap" }}>
                      {isEditing ? <input type="date" value={editData.date||""} onChange={e => setEditData({...editData,date:e.target.value})} style={inS}/> : r.date}
                    </td>
                    <td style={{ padding:"10px 12px", minWidth:80 }}>
                      {isEditing
                        ? <select value={editData.type||""} onChange={e => setEditData({...editData,type:e.target.value})} style={inS}>
                            {TRAINING_TYPES.map(t=><option key={t}>{t}</option>)}
                          </select>
                        : <span style={{ fontSize:11, padding:"2px 10px", borderRadius:20,
                            background:tc.bg, border:`1px solid ${tc.border}`, color:tc.color }}>
                            {r.type}

                    </td>
                    <td style={{ padding:"10px 12px", color:"#e2e8f0", fontWeight:600, minWidth:160 }}>
                      {isEditing ? <input value={editData.title||""} onChange={e => setEditData({...editData,title:e.target.value})} style={inS}/> : r.title}
                    </td>
                    <td style={{ padding:"10px 12px", color:"#94a3b8", minWidth:140 }}>
                      {isEditing ? <input value={editData.location||""} onChange={e => setEditData({...editData,location:e.target.value})} style={inS}/> : r.location}
                    </td>
                    <td style={{ padding:"10px 12px", color:"#94a3b8", minWidth:65, textAlign:"right" }}>
                      {isEditing ? <input type="number" value={editData.duration||""} onChange={e => setEditData({...editData,duration:e.target.value})} style={inS}/> : r.duration}
                    </td>
                    <td style={{ padding:"10px 12px", color:"#64748b", minWidth:100 }}>
                      {isEditing ? <input value={editData.instructor||""} onChange={e => setEditData({...editData,instructor:e.target.value})} style={inS}/> : (r.instructor||"—")}
                    </td>
                    <td style={{ padding:"10px 12px", minWidth:70 }}>
                      {isEditing
                        ? <select value={editData.result||""} onChange={e => setEditData({...editData,result:e.target.value})} style={inS}>
                            {["通過","待改善","未通過","--"].map(v=><option key={v}>{v}</option>)}
                          </select>
                        : <span style={{ fontSize:11, color: r.result==="通過" ? "#86efac" : r.result==="未通過" ? "#fca5a5" : "#fcd34d" }}>
                            {r.result}
                          </span>}
                    </td>
                    <td style={{ padding:"10px 12px", color:"#64748b", minWidth:120 }}>
                      {isEditing ? <input value={editData.note||""} onChange={e => setEditData({...editData,note:e.target.value})} style={inS}/> : (r.note||"—")}
                    </td>
                    {isAdminMode && (
                      <td style={{ padding:"10px 12px", whiteSpace:"nowrap" }}>
                        {isEditing ? <>
                          <button onClick={saveEdit} style={{ fontSize:11, background:"#16a34a", border:"none",
                            color:"#fff", padding:"3px 8px", borderRadius:4, cursor:"pointer", marginRight:4 }}>✓ 儲存</button>
                          <button onClick={() => setEditingId(null)} style={{ fontSize:11, background:"#334155",
                            border:"none", color:"#94a3b8", padding:"3px 8px", borderRadius:4, cursor:"pointer" }}>取消</button>
                        </> : <>
                          <button onClick={() => startEdit(r)} style={{ fontSize:11, background:"#1e3a5f",
                            border:"none", color:"#93c5fd", padding:"3px 8px", borderRadius:4, cursor:"pointer", marginRight:4 }}>✏️ 編輯</button>
                          <button onClick={() => {
                            if (window.confirm("確定刪除？")) { setRecords(prev => prev.filter(x => x.id !== r.id)); showToast("已刪除"); }
                          }} style={{ fontSize:11, background:"#7f1d1d", border:"none",
                            color:"#fca5a5", padding:"3px 8px", borderRadius:4, cursor:"pointer" }}>刪除</button>
                        </>}
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── License Page ─────────────────────────────────────────────────────────────
function LicensePage({ licenses, setLicenses, showToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editData, setEditData] = useState({});
  const EMPTY = { name:"", type:"毒性化學物質操作許可", chemicals:"", expiryDate:"", note:"" };
  const [form, setForm] = useState(EMPTY);

  const inputS = { background:"#0f172a", border:"1px solid #334155", color:"#e2e8f0",
    borderRadius:6, padding:"7px 10px", fontSize:12, width:"100%", boxSizing:"border-box" };
  const labelS = { fontSize:11, color:"#64748b", marginBottom:3, display:"block" };

  const today = new Date();
  const daysUntil = d => Math.ceil((new Date(d) - today) / 86400000);

  const statusInfo = (d) => {
    const days = daysUntil(d);
    if (days < 0)   return { color:"#ef4444", bg:"#7f1d1d22", border:"#ef4444", label:"已到期",    icon:"🔴" };
    if (days <= 30) return { color:"#f97316", bg:"#78350f22", border:"#f97316", label:`${days}天後到期`, icon:"🟠" };
    if (days <= 90) return { color:"#eab308", bg:"#713f1222", border:"#eab308", label:`${days}天後到期`, icon:"🟡" };
    return              { color:"#22c55e", bg:"#14532d22", border:"#22c55e", label:`${days}天後到期`, icon:"🟢" };
  };

  // Sort: expired first, then soonest
  const sorted = [...licenses].sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));

  const expired = licenses.filter(l => daysUntil(l.expiryDate) < 0).length;
  const soon30  = licenses.filter(l => { const d=daysUntil(l.expiryDate); return d>=0&&d<=30; }).length;
  const soon90  = licenses.filter(l => { const d=daysUntil(l.expiryDate); return d>30&&d<=90; }).length;
  const ok      = licenses.filter(l => daysUntil(l.expiryDate) > 90).length;

  const save = () => {
    if (!form.name || !form.expiryDate) { showToast("請填寫證件名稱與到期日", "error"); return; }
    setLicenses(prev => [...prev, { ...form, id: Date.now() }]);
    setForm(EMPTY); setShowAdd(false); showToast("已新增");
  };
  const saveEdit = () => {
    setLicenses(prev => prev.map(l => l.id === editingId ? editData : l));
    setEditingId(null); showToast("已儲存");
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
        <h2 style={{ margin:0, fontSize:20, color:"#f1f5f9" }}>📄 毒化物證件到期提醒</h2>

          { label:"已到期",    value:expired, color:"#ef4444", icon:"🔴" },
          { label:"30天內到期", value:soon30,  color:"#f97316", icon:"🟠" },
          { label:"90天內到期", value:soon90,  color:"#eab308", icon:"🟡" },
          { label:"有效",      value:ok,      color:"#22c55e", icon:"🟢" },
        ].map(s => (
          <div key={s.label} style={{ background:"#1e293b", borderRadius:10, padding:"14px 16px",
            borderTop:`3px solid ${s.color}` }}>

          </div>
        ))}
      </div>

      {/* 新增表單 */}
      {showAdd && (
        <div style={{ background:"#1e293b", borderRadius:10, padding:18, marginBottom:16, border:"1px solid #334155" }}>
          <div style={{ fontSize:14, fontWeight:700, color:"#f1f5f9", marginBottom:14 }}>＋ 新增證件提醒</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
            <div style={{ gridColumn:"1 / span 2" }}>
              <label style={labelS}>證件名稱 *（許可證字號）</label>
              <select value={form.name} onChange={e => setForm({...form,name:e.target.value})} style={inputS}>

              <label style={labelS}>類型</label>
              <select value={form.type} onChange={e => setForm({...form,type:e.target.value})} style={inputS}>
                {["毒性化學物質操作許可","關注化學物質操作許可","其他"].map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={labelS}>相關化學品</label>
              <input value={form.chemicals} onChange={e => setForm({...form,chemicals:e.target.value})}
                placeholder="乙腈、三氯甲烷等" style={inputS} />
            </div>
            <div>
              <label style={labelS}>備註</label>
              <input value={form.note} onChange={e => setForm({...form,note:e.target.value})} style={inputS} />
            </div>
          </div>
          <div style={{ display:"flex", gap:8, marginTop:14 }}>
            <button onClick={save} style={{ background:"#0ea5e9", border:"none", color:"#fff",
              borderRadius:6, padding:"8px 20px", cursor:"pointer", fontSize:13, fontWeight:600 }}>儲存</button>
            <button onClick={() => { setShowAdd(false); setForm(EMPTY); }}
              style={{ background:"#334155", border:"none", color:"#94a3b8",
                borderRadius:6, padding:"8px 16px", cursor:"pointer", fontSize:13 }}>取消</button>
          </div>
        </div>
      )}

      {/* 證件列表 */}
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {sorted.map(l => {
          const s = statusInfo(l.expiryDate);
          const isEditing = editingId === l.id;
          const inS = { background:"#0f172a", border:"1px solid #334155", color:"#e2e8f0",
            borderRadius:4, padding:"4px 8px", fontSize:12, width:"100%", boxSizing:"border-box" };
          return (
            <div key={l.id} style={{ background:"#1e293b", borderRadius:12, padding:"16px 18px",
              border:`1px solid ${s.border}33`, borderLeft:`4px solid ${s.border}` }}>
              {isEditing ? (
                <div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:10 }}>
                    <div style={{ gridColumn:"1 / span 2" }}>
                      <label style={labelS}>證件名稱</label>
                      <select value={editData.name||""} onChange={e => setEditData({...editData,name:e.target.value})} style={inS}>
                        {PERMIT_NUMBERS.map(p => <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={labelS}>到期日</label>
                      <input type="date" value={editData.expiryDate||""} onChange={e => setEditData({...editData,expiryDate:e.target.value})} style={inS} />
                    </div>
                    <div>
                      <label style={labelS}>類型</label>
                      <select value={editData.type||""} onChange={e => setEditData({...editData,type:e.target.value})} style={inS}>
                        {["毒性化學物質操作許可","關注化學物質操作許可","其他"].map(t => <option key={t}>{t}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={labelS}>相關化學品</label>
                      <input value={editData.chemicals||""} onChange={e => setEditData({...editData,chemicals:e.target.value})} style={inS} />
                    </div>
                    <div>
                      <label style={labelS}>備註</label>
                      <input value={editData.note||""} onChange={e => setEditData({...editData,note:e.target.value})} style={inS} />
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={saveEdit} style={{ fontSize:12, background:"#16a34a", border:"none",
                      color:"#fff", borderRadius:6, padding:"5px 14px", cursor:"pointer" }}>✓ 儲存</button>
                    <button onClick={() => setEditingId(null)} style={{ fontSize:12, background:"#334155",
                      border:"none", color:"#94a3b8", borderRadius:6, padding:"5px 12px", cursor:"pointer" }}>取消</button>
                  </div>
                </div>
              ) : (
                <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", marginBottom:6 }}>
                      <span style={{ fontSize:15, fontWeight:800, color:"#f1f5f9" }}>{l.name}</span>
                      <span style={{ fontSize:11, background:s.bg, border:`1px solid ${s.border}`,
                        color:s.color, padding:"2px 10px", borderRadius:20 }}>
                        {s.icon} {s.label}
                      </span>
                    </div>
                    <div style={{ display:"flex", gap:16, fontSize:11, flexWrap:"wrap" }}>
                      <span style={{ color:"#64748b" }}>類型：<span style={{ color:"#94a3b8" }}>{l.type}</span></span>
                      <span style={{ color:"#64748b" }}>到期日：<span style={{ color:"#e2e8f0", fontWeight:700 }}>{l.expiryDate}</span></span>
                      {l.chemicals && <span style={{ color:"#64748b" }}>相關化學品：<span style={{ color:"#94a3b8" }}>{l.chemicals}</span></span>}
                      {l.note && <span style={{ color:"#475569" }}>備註：{l.note}</span>}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                    <button onClick={() => { setEditingId(l.id); setEditData({...l}); }}
                      style={{ fontSize:11, background:"#1e3a5f", border:"none", color:"#93c5fd",
                        borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>✏️ 編輯</button>
                    <button onClick={() => {
                      if (window.confirm("確定刪除？")) { setLicenses(prev => prev.filter(x => x.id !== l.id)); showToast("已刪除"); }
                    }} style={{ fontSize:11, background:"#7f1d1d", border:"none", color:"#fca5a5",
                      borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>刪除</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Shared Modal ──────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, wide }) {
  return (
    <div style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex",
      alignItems:"center", justifyContent:"center", zIndex:1000, animation:"fadeIn 0.2s ease"
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background:"#1e293b", borderRadius:12, padding:20, width: wide ? 680 : 400,
        maxHeight:"85vh", overflow:"auto", border:"1px solid #334155",
        boxShadow:"0 20px 60px rgba(0,0,0,0.5)"
      }}>
        <div style={{ display:"flex", alignItems:"center", marginBottom:16 }}>
          <h3 style={{ margin:0, fontSize:16, color:"#f1f5f9" }}>{title}</h3>
          <button onClick={onClose} style={{ marginLeft:"auto", background:"none", border:"none", color:"#64748b", cursor:"pointer", fontSize:18 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── Style Helpers ─────────────────────────────────────────────────────────────
const btnStyle = (bg) => ({
  background: bg, border:"none", color:"#fff", padding:"8px 16px",
  borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:500
});
const labelStyle = { fontSize:11, color:"#64748b", display:"block", marginBottom:4 };
const inputStyle = {
  width:"100%", padding:"7px 10px", background:"#0f172a",
  border:"1px solid #334155", borderRadius:6, color:"#fff", fontSize:13
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
